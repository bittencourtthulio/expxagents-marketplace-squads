      - id: step-02
        agent: hormozi-chief
        label: Audit — route to specialist agents for domain analysis
        deliverFrom: hormozi-chief
        execution: inline
      - id: step-03
        agent: hormozi-chief
        label: Strategy — synthesize specialist insights into unified plan
        deliverFrom: hormozi-chief
        execution: inline
      - id: step-04
        agent: hormozi-chief
        label: Execution Plan — translate strategy into prioritized actions
        deliverFrom: hormozi-chief
        execution: inline
      - id: step-05
        agent: hormozi-chief
        label: Review — final quality check and Business Strategy Report delivery
        deliverFrom: hormozi-chief
        execution: inline
