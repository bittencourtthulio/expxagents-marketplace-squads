  data: []

  agents:
    - id: hormozi-chief
      name: Hormozi Chief
      icon: rocket
      prompt: agents/hormozi-chief.agent.md
    - id: offer-architect
      name: Offer Architect
      icon: package
      prompt: agents/offer-architect.agent.md
    - id: lead-gen-strategist
      name: Lead Gen Strategist
      icon: magnet
      prompt: agents/lead-gen-strategist.agent.md
    - id: pricing-strategist
      name: Pricing Strategist
      icon: tag
      prompt: agents/pricing-strategist.agent.md
    - id: closer
      name: Closer
      icon: handshake
      prompt: agents/closer.agent.md
    - id: content-machine
      name: Content Machine
      icon: megaphone
      prompt: agents/content-machine.agent.md
    - id: retention-engineer
      name: Retention Engineer
      icon: anchor
      prompt: agents/retention-engineer.agent.md
    - id: scaling-advisor
      name: Scaling Advisor
      icon: trending-up
      prompt: agents/scaling-advisor.agent.md
    - id: business-auditor
