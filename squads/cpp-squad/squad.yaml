squad:
  code: cpp-squad
  name: C++ Squad
  description: Modern C++ development — systems, game dev, Qt, concurrency, and performance-critical applications
  icon: bolt
  version: "1.0.0"
  category: development
  tags:
    - cpp
    - modern-cpp
    - game-dev
    - qt
    - concurrency
    - systems

  company: "_expxagents/_memory/company.md"
  preferences: "_expxagents/_memory/preferences.md"
  memory: "_memory/memories.md"

  target_audience: "C++ developers, game developers, and systems engineers"
  platform: "Report"
  format: "cpp-development"

  skills:
    - web_search
    - web_fetch

  schedule:
    enabled: true

  data: []

  agents:
    - id: cpp-chief
      name: C++ Chief
      icon: bolt
      prompt: agents/cpp-chief.agent.md
    - id: code-quality-advisor
      name: Code Quality Advisor
      icon: check-circle
      prompt: agents/code-quality-advisor.agent.md
    - id: devops-engineer
      name: DevOps Engineer
      icon: server
      prompt: agents/devops-engineer.agent.md
    - id: systems-architect
      name: Systems Architect
      icon: layers
      prompt: agents/systems-architect.agent.md
    - id: game-dev-specialist
      name: Game Dev Specialist
      icon: zap
      prompt: agents/game-dev-specialist.agent.md
    - id: concurrency-specialist
      name: Concurrency Specialist
      icon: cpu
      prompt: agents/concurrency-specialist.agent.md
    - id: qt-specialist
      name: Qt Specialist
      icon: globe
      prompt: agents/qt-specialist.agent.md
    - id: test-engineer
      name: Test Engineer
      icon: shield
      prompt: agents/test-engineer.agent.md

  pipeline:
    steps:
      - id: step-01
        agent: cpp-chief
        label: Diagnose the C++ challenge and classify the technical domain
        execution: inline
      - id: step-02
        agent: cpp-chief
        label: Route to specialist agents for domain-specific analysis
        deliverFrom: cpp-chief
        execution: inline
      - id: step-03
        agent: cpp-chief
        label: Architect the solution with performance, safety, and modern C++ idioms
        deliverFrom: cpp-chief
        execution: inline
      - id: step-04
        agent: cpp-chief
        label: Implement and review code against C++ Core Guidelines
        deliverFrom: cpp-chief
        execution: inline
      - id: step-05
        agent: cpp-chief
        label: Final review and C++ Development Report delivery
        deliverFrom: cpp-chief
        execution: inline
